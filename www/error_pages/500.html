<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>500 - Erro Interno do Servidor</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}
		
		.container {
			background: white;
			border-radius: 10px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
			max-width: 600px;
			padding: 50px;
			text-align: center;
		}
		
		h1 {
			font-size: 4em;
			color: #fa709a;
			margin-bottom: 20px;
		}
		
		p {
			color: #666;
			font-size: 1.1em;
			margin-bottom: 30px;
		}
		
		a {
			display: inline-block;
			background: #fa709a;
			color: white;
			padding: 12px 30px;
			text-decoration: none;
			border-radius: 5px;
			transition: background 0.3s ease;
		}
		
		a:hover {
			background: #fee140;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>500</h1>
		<p>Erro Interno do Servidor! Algo deu errado do nosso lado.</p>
		<a href="/">Voltar ao Início</a>
	</div>
</body>
</html>
