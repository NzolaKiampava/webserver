# Servidor B - Para teste de conflito de portas entre processos
# Este arquivo TAMBÉM usa porta 8080 (conflita com server A)
# E usa porta 9000 (não conflita)

server {
    listen 8080;
    server_name server-b.local;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
    
    client_max_body_size 10M;
    autoindex off;
}

server {
    listen 9000;
    server_name server-b-alt.local;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
}
