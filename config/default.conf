server {
	listen 8080;
	server_name localhost;
	
	root ./www;
	
	index index.html;
	
	autoindex off;
	
	error_page 404 /error_pages/404.html;
	error_page 403 /error_pages/403.html;
	error_page 500 /error_pages/500.html;
	
	client_max_body_size 100M;
	
	location / {
		allow all;
	}
	
	location /uploads {
		allow POST;
		allow GET;
	}
	
	location ~ \.py$ {
		cgi on;
		cgi_path /usr/bin/python3;
	}
}
