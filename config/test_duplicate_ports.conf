# TESTE: Portas duplicadas no mesmo arquivo
# Este arquivo deve FALHAR ao iniciar - não é permitido ter a mesma porta duas vezes

# Primeiro servidor na porta 8080
server {
    listen 8080;
    server_name first.local;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
    
    client_max_body_size 1M;
    autoindex on;
}

# Segundo servidor também na porta 8080 - ISSO VAI FALHAR!
server {
    listen 8080;
    server_name second.local;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
    
    client_max_body_size 5M;
    autoindex off;
}

# Terceiro servidor na porta 8081 - OK
server {
    listen 8081;
    server_name third.local;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
}
