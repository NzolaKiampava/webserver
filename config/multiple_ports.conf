# Configuração com múltiplos servidores em portas diferentes
# Este arquivo demonstra como configurar o webserver para escutar em várias portas simultaneamente

# Servidor principal na porta 8080
server {
    listen 8080;
    server_name localhost;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
    
    client_max_body_size 1M;
    autoindex on;
    
    error_page 404 /error_pages/404.html;
    error_page 500 /error_pages/500.html;
    error_page 403 /error_pages/403.html;
    
    location / {
        allow GET;
        allow POST;
    }
    
    location /uploads {
        allow GET;
        allow POST;
        allow DELETE;
        upload_dir ./www/uploads;
    }
    
    location /cgi-bin {
        allow GET;
        allow POST;
        cgi_enabled on;
        cgi_path /usr/bin/python3;
        cgi_extension .py;
    }
    
    location ~ \.php$ {
        allow GET;
        allow POST;
        cgi_enabled on;
        cgi_path /usr/bin/php-cgi;
        cgi_extension .php;
    }
    
    location ~ \.pl$ {
        allow GET;
        allow POST;
        cgi_enabled on;
        cgi_path /usr/bin/perl;
        cgi_extension .pl;
    }
}

# Servidor alternativo na porta 8081
server {
    listen 8081;
    server_name alternative.local;
    host 0.0.0.0;
    
    root ./www;
    index index.html;
    
    client_max_body_size 5M;
    autoindex off;
    
    error_page 404 /error_pages/404.html;
    error_page 500 /error_pages/500.html;
    
    location / {
        allow GET;
        allow POST;
        allow PUT;
    }
    
    location /uploads {
        allow GET;
        allow POST;
        allow DELETE;
        upload_dir ./www/uploads;
    }
}

