server {
	listen 8080;
	server_name localhost;
	host 0.0.0.0;
	
	root ./www;
	index index.html index.htm;
	
	autoindex on;
	
	# Páginas de erro customizadas
	error_page 404 /error_pages/404.html;
	error_page 403 /error_pages/403.html;
	error_page 500 /error_pages/500.html;
	
	# Tamanho máximo de upload: 100MB
	client_max_body_size 100M;
	
	# Timeouts
	timeout 60;
	cgi_timeout 10;
	
	# Rota principal
	location / {
		allow GET;
		allow POST;
		allow DELETE;
		autoindex on;
	}
	
	# Diretório de uploads
	location /uploads {
		allow POST;
		allow GET;
		allow DELETE;
		upload_dir ./www/uploads;
		autoindex on;
	}
	
	# Scripts Python CGI
	location ~ \.py$ {
		allow GET;
		allow POST;
		cgi on;
		cgi_path /usr/bin/python3;
	}
	
	# Scripts PHP CGI
	location ~ \.php$ {
		allow GET;
		allow POST;
		cgi on;
		cgi_path /usr/bin/php-cgi;
	}
	
	# CGI-BIN directory
	location /cgi-bin {
		allow GET;
		allow POST;
		cgi on;
		cgi_path /usr/bin/python3;
	}
}

# Servidor adicional na porta 8081 (exemplo de múltiplos servidores)
server {
	listen 8081;
	server_name api.localhost;
	host 0.0.0.0;
	
	root ./www/api;
	index index.json;
	
	autoindex off;
	
	error_page 404 /error.json;
	
	client_max_body_size 10M;
	timeout 30;
	cgi_timeout 5;
	
	location / {
		allow GET;
		allow POST;
	}
	
	location /uploads {
		allow POST;
		upload_dir ./www/api/uploads;
	}
}
